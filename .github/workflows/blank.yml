name: Node.js CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install python dependencies
        run: python3 -m pip install yt-dlp -U && python3 -m pip install yt-dlp --upgrade

      - name: Install dependencies
        run: npm install && npm uninstall @whiskeysockets/baileys && npm install @whiskeysockets/baileys

      - name: Start application
        run: node index.js
